<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitster Digital</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Hitster Digital</h1>
    </header>

    <main>
        <section id="player-section">
            <button id="btn-play">Conectar con Spotify</button>
            <audio id="audio-player"></audio>
        </section>

        <section id="setup-section" class="game-section" style="display: none; flex-direction: column; gap: 15px;">
            <h3>Configuración de la Partida</h3>
            <label for="num-teams">¿Cuántos equipos van a jugar? (2-4):</label>
            <input type="number" id="num-teams" min="2" max="4" value="2" style="padding: 10px; border-radius: 5px; width: 100%; text-align: center;">
            
            <div id="teams-input-container" style="display: flex; flex-direction: column; gap: 10px; width: 100%;"></div>

            <button id="btn-start-game">Comenzar Partida</button>
        </section>

        <section id="game-play-section" class="game-section" style="display: none; width: 100%; flex-direction: column; gap: 20px;">
            
            <div id="turn-indicator" style="background: #222; width: 100%; padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; border-left: 5px solid var(--accent-color);">
                Turno del Equipo
            </div>

            <!-- CONTROLES DE REPRODUCCIÓN -->
            <div style="display: flex; gap: 10px; width: 100%;">
                <button id="btn-toggle-pause" style="background-color: #3498db; color: white; flex: 1;">⏸️ Pausar</button>
                <button id="btn-skip" style="background-color: #e67e22; color: white; flex: 2;">Pasar Canción (Cuesta <span id="skip-cost">1</span> 🪙)</button>
            </div>

            <div id="betting-panel" style="background: #1a1a1a; padding: 15px; border-radius: 11px; width: 100%; display: flex; flex-direction: column; gap: 10px;">
                <h4 id="phase-title" style="color: var(--text-secondary); text-transform: uppercase; font-size: 0.9rem;">Fase de Colocación</h4>
                
                <div id="active-team-bet">
                    <p id="bet-instruction" style="font-size: 0.9rem; margin-bottom: 5px;">Selecciona dónde encaja esta canción en tu línea temporal:</p>
                    <select id="select-placement" style="width:100%; padding: 10px; border-radius: 5px; background: #333; color: white;"></select>
                    <button id="btn-confirm-active" style="margin-top: 10px; background-color: var(--accent-color); color: white;">Confirmar Posición</button>
                </div>

                <div id="rivals-bet-panel" style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #333; display: none;">
                    <p style="font-size: 0.9rem; color: #ff0080; font-weight: bold;">¿Algún equipo rival quiere apostar al robo?</p>
                    <div id="rivals-buttons-container" style="display:flex; flex-direction:column; gap:8px; margin-top:8px;"></div>
                </div>
            </div>

            <div id="card-section" style="display: flex; flex-direction: column; align-items: center; width: 100%;">
                <button id="btn-reveal" style="display: none; background-color: #2ecc71; color: white; margin-bottom: 15px;"> Revelar Respuesta y Validar</button>
                
                <div id="secret-card" class="card hidden">
                    <h2 id="card-title">Título de la Canción</h2>
                    <p id="card-artist">Nombre del Artista</p>
                    <div>
                        <span id="card-year">0000</span>
                    </div>
                </div>
                
                <button id="btn-resolve-turn" style="background-color: var(--text-color); color: black; display: none; margin-top: 15px; width: 100%;">Terminar Turno y Avanzar</button>
            </div>

            <div id="teams-board" style="display: flex; flex-direction: column; gap: 20px; width: 100%;">
            </div>
        </section>

        <button id="btn-logout" class="btn-secondary" style="display: none; margin-top: 20px;">Salir</button>
    </main>

    <script src="script.js"></script>
</body>
</html>
